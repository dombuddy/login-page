<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search App</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f0f2f5;
  font-family:Arial;
}

/* container */
.box{
  background:white;
  padding:40px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;
  width:300px;
}

/* input */
input{
  width:100%;
  padding:12px;
  margin:15px 0;
  border:1px solid #ccc;
  border-radius:6px;
}

/* button */
button{
  width:100%;
  padding:12px;
  background:#007bff;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:#0056b3;
}

/* THANK YOU ANIMATION */
#thanks{
  display:none;
  font-size:22px;
  color:green;
  margin-top:20px;
  animation: pop 0.6s ease;
}

@keyframes pop{
  0% { transform:scale(0); opacity:0; }
  100% { transform:scale(1); opacity:1; }
}

</style>
</head>

<body>

<div class="box">

  <h2>Search Box</h2>

  <input type="text" id="searchBox" placeholder="Type something...">

  <button onclick="sendMail()">Submit</button>

  <div id="thanks">🎉 Thanks!</div>

</div>

<script>

emailjs.init("W-WD9-A9EdXElvKgO"); // replace

function sendMail(){

  let searchText = document.getElementById("searchBox").value;

  let params = {
    message: searchText
  };

  emailjs.send(
    "service_eo2ai99",   // replace
    "template_4jpss7r",  // replace
    params
  )
  .then(function(){

    // show thanks animation
    let t = document.getElementById("thanks");
    t.style.display = "block";

    // hide after 3 sec
    setTimeout(()=>{
      t.style.display = "none";
    },3000);

    // clear input
    document.getElementById("searchBox").value = "";

  })

  .catch(function(error){
    console.log(error);
  });

}

</script>

</body>
</html>
