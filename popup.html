<!DOCTYPE html>
<html>
<head>
  <title>Center Popup</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f2f2;
    }

    /* Dark background overlay */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Popup box */
    .popup {
      background: white;
      padding: 25px;
      border-radius: 10px;
      text-align: center;
      width: 300px;
      box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
    }

    .popup h2 {
      color: red;
    }

    .btn {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      background: green;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .btn:hover {
      background: darkgreen;
    }
  </style>
</head>

<body>

<!-- Popup -->
<div class="overlay" id="popup">
  <div class="popup">
    <h2>⚠️ Notice</h2>
    <p>Your System is Hacked!.</p>
    <button class="btn" onclick="closePopup()">OK</button>
  </div>
</div>

<script>
  function closePopup() {
    document.getElementById("popup").style.display = "none";
  }
</script>

</body>
</html>
